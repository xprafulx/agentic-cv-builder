<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Career Strategist</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 flex items-center justify-center min-h-screen p-6 font-sans">
    <div class="bg-white p-8 rounded-2xl shadow-xl max-w-2xl w-full border border-slate-100">
        <h1 class="text-3xl font-extrabold text-slate-800 mb-2 tracking-tight">Agentic CV Builder</h1>
        <p class="text-slate-500 mb-8">Upload your master PDF and paste the job description. The AI agents will analyze, rewrite, and format a perfect LaTeX document.</p>
        
        <form id="cvForm" class="space-y-6">
            <div>
                <label class="block text-sm font-semibold text-slate-700 mb-2">1. Upload Master CV (PDF)</label>
                <input type="file" id="cvFile" accept="application/pdf" required
                    class="block w-full text-sm text-slate-500 file:mr-4 file:py-2 file:px-4 file:rounded-md file:border-0 file:text-sm file:font-semibold file:bg-blue-50 file:text-blue-700 hover:file:bg-blue-100 cursor-pointer border border-slate-200 rounded-lg p-2 transition-colors">
            </div>

            <div>
                <label class="block text-sm font-semibold text-slate-700 mb-2">2. Target Job Description</label>
                <textarea id="jdText" rows="6" required placeholder="Paste the full job description here..."
                    class="w-full border-slate-200 border rounded-lg p-3 focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-all text-slate-700 text-sm"></textarea>
            </div>

            <button type="submit" id="submitBtn"
                class="w-full bg-blue-600 text-white font-bold py-3 px-4 rounded-lg hover:bg-blue-700 transition duration-200 flex justify-center items-center shadow-md">
                <span id="btnText">Generate Tailored CV</span>
                <svg id="spinner" class="animate-spin ml-2 h-5 w-5 text-white hidden" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                    <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                    <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                </svg>
            </button>
        </form>

        <div id="status" class="mt-4 text-center text-sm font-medium text-blue-600 hidden animate-pulse">
            Agents are auditing the draft... This usually takes 20-30 seconds.
        </div>
    </div>

    <script>
        document.getElementById('cvForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const fileInput = document.getElementById('cvFile').files[0];
            const jdText = document.getElementById('jdText').value;
            const submitBtn = document.getElementById('submitBtn');
            const btnText = document.getElementById('btnText');
            const spinner = document.getElementById('spinner');
            const status = document.getElementById('status');

            // Set Loading UI
            submitBtn.disabled = true;
            submitBtn.classList.add('opacity-75', 'cursor-not-allowed');
            btnText.textContent = 'Engineering CV...';
            spinner.classList.remove('hidden');
            status.classList.remove('hidden');

            const formData = new FormData();
            formData.append('file', fileInput);
            formData.append('job_description', jdText);

            try {
                // Call our FastAPI server
                const response = await fetch('http://localhost:8000/generate-cv/', {
                    method: 'POST',
                    body: formData
                });

                if (!response.ok) {
                    throw new Error(`Server Error: ${response.statusText}`);
                }

                // Trigger the file download invisibly
                const blob = await response.blob();
                const downloadUrl = window.URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = downloadUrl;
                a.download = 'Tailored_Application.pdf';
                document.body.appendChild(a);
                a.click();
                a.remove();
                window.URL.revokeObjectURL(downloadUrl);

            } catch (error) {
                alert('An error occurred: ' + error.message);
            } finally {
                // Reset UI
                submitBtn.disabled = false;
                submitBtn.classList.remove('opacity-75', 'cursor-not-allowed');
                btnText.textContent = 'Generate Tailored CV';
                spinner.classList.add('hidden');
                status.classList.add('hidden');
            }
        });
    </script>
</body>
</html>
