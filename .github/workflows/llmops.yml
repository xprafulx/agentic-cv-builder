name: LLMOps CI Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Lint with flake8
      run: |
        pip install flake8
        # stop the build if there are Python syntax errors or undefined names
        flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics

    - name: Smoke Test FastAPI Startup
      run: |
        # This starts the server in the background and checks if it stays alive for 5 seconds
        nohup python -m uvicorn api:app --host 0.0.0.0 --port 8000 & 
        sleep 5
        curl http://localhost:8000/docs | grep "Swagger UI"